<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PatchCouncil UI Spike</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">PC</div>
        <div>
          <h1>PatchCouncil</h1>
          <p>UI Spike</p>
        </div>
      </div>
      <div class="sessions-header">
        <span>Sessions</span>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
      <nav id="sessionList" class="session-list" aria-label="Session list"></nav>
    </aside>

    <main class="workspace">
      <section class="topbar">
        <div>
          <p class="eyebrow">Council Session</p>
          <h2 id="sessionTitle">No session selected</h2>
        </div>
        <div id="phaseBadge" class="phase-badge">idle</div>
      </section>

      <section class="content-grid">
        <section class="timeline-panel">
          <div class="panel-heading">
            <h3>Discussion Timeline</h3>
            <span id="eventCount">0 events</span>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </section>

        <aside class="status-panel">
          <div class="panel-heading">
            <h3>Work Status</h3>
          </div>
          <dl id="statusGrid" class="status-grid"></dl>
          <div class="status-section">
            <h4>Agents</h4>
            <div id="agentList" class="agent-list"></div>
          </div>
          <div class="status-section">
            <h4>Latest Signal</h4>
            <p id="latestSignal" class="latest-signal">No events loaded.</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

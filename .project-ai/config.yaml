agents:
  codex:
    type: cli
    command: codex
    args:
    - exec
    - --json
    - --sandbox
    - read-only
    - --ephemeral
    - '-'
    input_mode: stdin
    capabilities:
    - plan
    - synthesize
    - review
    - judge
    write_access: false
    timeout_sec: 1800
  claude:
    type: cli
    command: claude
    args:
    - -p
    - --output-format
    - stream-json
    - --include-partial-messages
    - --verbose
    - --no-session-persistence
    - --permission-mode
    - bypassPermissions
    - --max-budget-usd
    - '1'
    input_mode: argument
    capabilities:
    - challenge
    - implement
    - fix
    write_access: false
    timeout_sec: 1800
council:
  max_turns: 3
  min_distinct_agents: 2
  max_context_chars: 2500
  max_transcript_chars: 2500
  max_message_chars: 800
context:
  max_files: 20
  max_diff_chars: 40000
  include:
  - README.md
  - package.json
  - pyproject.toml
  - Cargo.toml
  - go.mod
  - .project-ai/memory.md
  - .project-ai/decisions.md
  exclude:
  - .git
  - node_modules
  - dist
  - build
  - target
  - .venv
